<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡單字練習</title>

    <!-- PWA 支援腳本 -->
    <!-- 1. 連結到新的檔名 -->
    <link rel="manifest" href="./site.webmanifest">
    <meta name="theme-color" content="#ffffff">
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // 2. 增加 scope 定義與手機端 alert 除錯機制
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(reg => {
                        console.log('Service Worker 註冊成功', reg);
                        // 如果註冊成功，我們可以透過 console 看到，不干擾使用者
                    })
                    .catch(err => {
                        // 3. 如果失敗，手機會跳出視窗告知原因
                        alert('PWA 註冊失敗，原因：' + err);
                    });
            });
        }
    </script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-bounce-subtle { animation: bounce-subtle 2s infinite ease-in-out; }
        body { background-color: #ffffff; color: #1a1a1a; min-height: 100vh; }
        input::placeholder { opacity: 0.3; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 此處保留你原本的 React 邏輯 (Icon, App 組件等)，不需要更動
        const { useState, useRef, useEffect } = React;
        // ... (中間省略你原本強大的單字練習邏輯) ...
        
        // --- 確保底部 root 渲染正常 ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
