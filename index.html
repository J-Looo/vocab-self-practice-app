<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>左營國中單字挑戰站</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        body { background-color: #ffffff; color: #1a1a1a; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // 圖標組件 (Icon)
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                play: <path d="m6 3 14 9-14 9V3z" />,
                save: <React.Fragment><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></React.Fragment>,
                check: <polyline points="20 6 9 17 4 12" />,
                volume: <React.Fragment><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></React.Fragment>,
                trash: <React.Fragment><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></React.Fragment>,
                arrowRight: <path d="M5 12h14M12 5l7 7-7 7" />,
                home: <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zM9 22V12h6v10" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            // 預設單字
            const defaultText = `apple, 蘋果, fruit, 名詞, 水果店, An apple a day keeps the doctor away., 一天一蘋果，醫生遠離我。\nbrave, 勇敢的, fearless/courageous, 形容詞, 性格描述, He is a brave firefighter., 他是一位勇敢的消防員。\nabandon, 放棄, give up/quit, 動詞, 面對困難, Never abandon your dreams., 永遠不要放棄你的夢想。`;

            const [appState, setAppState] = useState('import');
            const [vocabList, setVocabList] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [userInput, setUserInput] = useState('');
            const [feedbackStatus, setFeedbackStatus] = useState('idle');
            const [isRandomized, setIsRandomized] = useState(false);
            const [isClozeMode, setIsClozeMode] = useState(false);
            const [importText, setImportText] = useState(() => localStorage.getItem('vocab_app_raw_text') || defaultText);
            const [isSaved, setIsSaved] = useState(false);

            const inputRef = useRef(null);

            useEffect(() => {
                if (appState === 'testing' && inputRef.current) inputRef.current.focus();
            }, [appState, currentIndex, feedbackStatus]);

            const playAudio = (word) => {
                if ('speechSynthesis' in window) {
                    const u = new SpeechSynthesisUtterance(word);
                    u.lang = 'en-US';
                    window.speechSynthesis.speak(u);
                }
            };

            const handleImport = () => {
                let list = importText.split('\n').filter(l => l.trim()).map(line => {
                    const p = line.split(',').map(s => s.trim());
                    return {
                        word: p[0], meaning: p[1],
                        synonyms: p[2] ? p[2].split('/').map(s => s.trim().toLowerCase()) : [],
                        pos: p[3] || '', context: p[4] || '',
                        example: p[5] || '', exampleTranslation: p[6] || '',
                        useCloze: isClozeMode
                    };
                }).filter(i => i.word && i.meaning);

                if (list.length > 0) {
                    const final = isRandomized ? list.sort(() => Math.random() - 0.5) : list;
                    setVocabList(final);
                    setCurrentIndex(0);
                    setAppState('testing');
                    setFeedbackStatus('idle');
                    setUserInput('');
                }
            };

            const handleSubmit = () => {
                const target = vocabList[currentIndex];
                if (userInput.trim().toLowerCase() === target.word.toLowerCase()) {
                    setFeedbackStatus('correct');
                    playAudio(target.word);
                } else {
                    setFeedbackStatus('wrong');
                }
            };

            // 匯入畫面
            if (appState === 'import') {
                return (
                    <div className="max-w-4xl mx-auto px-4 py-12 animate-fade-in flex flex-col items-center">
                        <h1 className="text-5xl font-light mb-12">建立題庫</h1>
                        <div className="flex gap-4 mb-8 w-full">
                            <label className="flex-1 bg-gray-50 p-6 rounded-2xl border-2 flex items-center justify-between cursor-pointer">
                                <span className="text-xl font-medium">隨機出題</span>
                                <input type="checkbox" checked={isRandomized} onChange={e => setIsRandomized(e.target.checked)} className="w-6 h-6" />
                            </label>
                            <label className="flex-1 bg-gray-50 p-6 rounded-2xl border-2 flex items-center justify-between cursor-pointer">
                                <span className="text-xl font-medium">語境模式</span>
                                <input type="checkbox" checked={isClozeMode} onChange={e => setIsClozeMode(e.target.checked)} className="w-6 h-6" />
                            </label>
                        </div>
                        <div className="w-full bg-white p-8 rounded-[2rem] border shadow-sm">
                            <textarea className="w-full h-64 p-6 bg-gray-50 border rounded-2xl font-mono text-lg mb-6 focus:outline-none" 
                                value={importText} onChange={e => setImportText(e.target.value)} />
                            <button onClick={handleImport} className="w-full bg-black text-white py-6 rounded-2xl text-2xl font-bold flex items-center justify-center gap-4">
                                <Icon name="play" /> 開始練習
                            </button>
                        </div>
                    </div>
                );
            }

            // 練習畫面
            if (appState === 'testing') {
                const vocab = vocabList[currentIndex];
                const maskedExample = vocab.example.replace(new RegExp(vocab.word, 'gi'), "____");

                return (
                    <div className="max-w-4xl mx-auto px-4 py-24 text-center animate-fade-in">
                        <button onClick={() => setAppState('import')} className="absolute top-8 left-8 text-gray-300 hover:text-black transition-colors"><Icon name="home" size={32}/></button>
                        <div className="mb-12">
                            {vocab.useCloze ? (
                                <div className="space-y-4">
                                    <h2 className="text-3xl font-bold text-indigo-600">{vocab.exampleTranslation}</h2>
                                    <p className="text-4xl font-serif text-gray-400 italic">"{maskedExample}"</p>
                                </div>
                            ) : (
                                <h2 className="text-8xl font-light text-gray-800">{vocab.meaning}</h2>
                            )}
                        </div>
                        <input ref={inputRef} type="text" value={userInput} onChange={e => setUserInput(e.target.value)}
                            onKeyDown={e => e.key === 'Enter' && (feedbackStatus === 'correct' ? (currentIndex + 1 < vocabList.length ? (setCurrentIndex(currentIndex+1), setUserInput(''), setFeedbackStatus('idle')) : setAppState('import')) : handleSubmit())}
                            className={`w-full text-center text-6xl py-4 bg-transparent border-b-4 focus:outline-none transition-colors ${feedbackStatus==='correct'?'border-green-400 text-green-600':'border-gray-200'}`}
                            placeholder="..." autoComplete="off" />
                        {feedbackStatus === 'correct' && (
                            <div className="mt-12 animate-fade-in">
                                <div className="flex justify-center items-center gap-4 mb-4">
                                    <span className="text-5xl font-bold">{vocab.word}</span>
                                    <button onClick={() => playAudio(vocab.word)} className="p-2 bg-gray-100 rounded-full"><Icon name="volume"/></button>
                                </div>
                                <button onClick={() => currentIndex + 1 < vocabList.length ? (setCurrentIndex(currentIndex+1), setUserInput(''), setFeedbackStatus('idle')) : setAppState('import')}
                                    className="bg-black text-white px-12 py-4 rounded-full text-xl font-bold inline-flex items-center gap-2">下一題 <Icon name="arrowRight"/></button>
                            </div>
                        )}
                    </div>
                );
            }
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
