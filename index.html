<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡單字練習</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ffffff">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 註冊成功', reg))
                    .catch(err => console.log('Service Worker 註冊失敗', err));
            });
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-bounce-subtle { animation: bounce-subtle 2s infinite ease-in-out; }
        body { background-color: #ffffff; color: #1a1a1a; min-height: 100vh; }
        input::placeholder { opacity: 0.3; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- 自定義圖標組件 ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                play: <path d="m6 3 14 9-14 9V3z" />,
                save: (
                    <React.Fragment>
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </React.Fragment>
                ),
                check: <polyline points="20 6 9 17 4 12" />,
                trash: (
                    <React.Fragment>
                        <path d="M3 6h18"/>
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                    </React.Fragment>
                ),
                volume: (
                    <React.Fragment>
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
                    </React.Fragment>
                ),
                arrowRight: (
                    <React.Fragment>
                        <path d="M5 12h14"/>
                        <polyline points="12 5 19 12 12 19"/>
                    </React.Fragment>
                ),
                rotate: (
                    <React.Fragment>
                        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
                        <polyline points="21 3 21 8 16 8"/>
                    </React.Fragment>
                ),
                enter: (
                    <React.Fragment>
                        <polyline points="9 10 4 15 9 20"/>
                        <path d="M20 4v7a4 4 0 0 1-4 4H4"/>
                    </React.Fragment>
                ),
                home: (
                    <React.Fragment>
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </React.Fragment>
                ),
                bell: (
                    <React.Fragment>
                        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
                        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
                    </React.Fragment>
                )
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            // 預設示範單字格式調整：英文單字, 中文翻譯, 詞性, 例句, 例句中文翻譯, 提示
            const defaultText = `apple, 蘋果, 名詞, An apple a day keeps the doctor away., 一天一蘋果，醫生遠離我。, 水果店購物\nbrave, 勇敢的, 形容詞, He is a brave firefighter., 他是一位勇敢的消防員。, 描述人物性格\nabandon, 放棄, 動詞, Never abandon your dreams., 永遠不要放棄你的夢想。, 面對困難時`;

            const [appState, setAppState] = useState('import'); 
            const [vocabList, setVocabList] = useState([]);
            const [mistakesList, setMistakesList] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [userInput, setUserInput] = useState('');
            const [feedbackStatus, setFeedbackStatus] = useState('idle'); 
            const [showHint, setShowHint] = useState(false); 
            const [isFlawed, setIsFlawed] = useState(false); 
            const [isRandomized, setIsRandomized] = useState(false); 
            const [isClozeMode, setIsClozeMode] = useState(false); 
            const [isSaved, setIsSaved] = useState(false);
            const [showResetModal, setShowResetModal] = useState(false);

            const [isFirstTime, setIsFirstTime] = useState(() => {
                return !localStorage.getItem('vocab_app_raw_text');
            });

            const [importText, setImportText] = useState(() => localStorage.getItem('vocab_app_raw_text') || defaultText);
            const [sheetUrl, setSheetUrl] = useState(() => localStorage.getItem('vocab_google_sheet_url') || '');
            
            const [savedSession, setSavedSession] = useState(() => {
                const s = localStorage.getItem('vocab_app_session');
                try { 
                    const session = s ? JSON.parse(s) : null; 
                    if (session && session.vocabList && session.vocabList.length > 0 && session.currentIndex < session.vocabList.length) {
                        return session;
                    }
                    return null;
                } catch(e) { return null; }
            });

            const inputRef = useRef(null);

            useEffect(() => {
                if (appState === 'testing' && inputRef.current) inputRef.current.focus();
            }, [appState, currentIndex, feedbackStatus]);

            const playSFX = (type) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    if (type === 'correct') {
                        osc.frequency.setValueAtTime(800, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                        gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    } else {
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(300, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.15);
                        gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    }
                    osc.start(); osc.stop(ctx.currentTime + 0.15);
                } catch(e) {}
            };

            const playAudio = (word) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(word);
                    u.lang = 'en-US';
                    
                    const voices = window.speechSynthesis.getVoices();
                    const usVoice = voices.find(v => v.lang === 'en-US' || v.lang === 'en_US') || 
                                    voices.find(v => v.lang.startsWith('en'));
                    if (usVoice) u.voice = usVoice;
                    
                    window.speechSynthesis.speak(u);
                }
            };

            const saveSessionToStorage = (list, mistakes, idx) => {
                const session = { vocabList: list, mistakesList: mistakes, currentIndex: idx, isRandomized, isClozeMode };
                localStorage.setItem('vocab_app_session', JSON.stringify(session));
                setSavedSession(session);
            };

            const handleManualSave = () => {
                localStorage.setItem('vocab_app_raw_text', importText);
                setIsFirstTime(false);
                setIsSaved(true);
                setTimeout(() => setIsSaved(false), 2000);
            };

            const handleFetchGoogleSheet = async () => {
                if (!sheetUrl.trim()) {
                    alert('請先輸入 Google 試算表的發布網址！');
                    return;
                }
                
                try {
                    const response = await fetch(sheetUrl);
                    if (!response.ok) throw new Error('讀取失敗，請檢查網址是否正確或是否已發布到網路');
                    
                    const text = await response.text();
                    
                    localStorage.setItem('vocab_google_sheet_url', sheetUrl);
                    setImportText(text);
                    setIsSaved(false);
                    
                    alert('雲端單字同步成功！已將單字載入至下方輸入框。');
                } catch (error) {
                    console.error(error);
                    alert('同步失敗：' + error.message);
                }
            };

            const handleImport = () => {
                if (!localStorage.getItem('vocab_app_raw_text')) {
                    localStorage.setItem('vocab_app_raw_text', importText);
                    setIsFirstTime(false);
                }

                let list = importText.split('\n').filter(l => l.trim()).map(line => {
                    // 同時支援「逗號」與 Excel 的「Tab鍵」分隔
                    const p = line.includes('\t') ? line.split('\t') : line.split(',');
                    const trimmedParams = p.map(s => s.trim());
                    const word = trimmedParams[0] || '';
                    
                    return {
                        word, 
                        meaning: trimmedParams[1] || '',
                        synonyms: [], // 新格式無同義詞
                        pos: trimmedParams[2] || '未提供', // 詞性移到第 3 欄
                        example: trimmedParams[3] || `Example for "${word}".`, // 例句移到第 4 欄
                        exampleTranslation: trimmedParams[4] || '', // 例句中文移到第 5 欄
                        context: trimmedParams[5] || '未提供', // 提示移到第 6 欄
                        useCloze: isClozeMode ? Math.random() > 0.5 : false 
                    };
                }).filter(i => i.word && i.meaning);

                if (list.length > 0) {
                    const finalWordList = isRandomized ? list.sort(() => Math.random() - 0.5) : list;
                    setVocabList(finalWordList); setMistakesList([]); setCurrentIndex(0);
                    resetQuestionState();
                    setAppState('testing');
                    saveSessionToStorage(finalWordList, [], 0);
                }
            };

            const handleSubmit = () => {
                if (!userInput.trim() || feedbackStatus === 'correct') return;
                const target = vocabList[currentIndex];
                const input = userInput.trim().toLowerCase();
                if (input === target.word.toLowerCase()) {
                    playSFX('correct'); setFeedbackStatus('correct'); playAudio(target.word);
                } else if (target.synonyms.includes(input)) {
                    playSFX('synonym'); setFeedbackStatus('synonym'); setUserInput('');
                } else {
                    playSFX('wrong'); setFeedbackStatus('wrong'); setIsFlawed(true);
                }
            };

            const handleNext = () => {
                const target = vocabList[currentIndex];
                let nextMistakes = mistakesList;
                if (isFlawed && !mistakesList.some(v => v.word === target.word)) {
                    nextMistakes = [...mistakesList, target];
                    setMistakesList(nextMistakes);
                }
                if (currentIndex + 1 < vocabList.length) {
                    const nextIdx = currentIndex + 1;
                    setCurrentIndex(nextIdx); 
                    resetQuestionState();
                    saveSessionToStorage(vocabList, nextMistakes, nextIdx);
                } else {
                    localStorage.removeItem('vocab_app_session');
                    setSavedSession(null);
                    setAppState('results');
                }
            };

            const handleResume = () => {
                if (savedSession) {
                    setVocabList(savedSession.vocabList);
                    setMistakesList(savedSession.mistakesList || []);
                    setCurrentIndex(savedSession.currentIndex);
                    setIsRandomized(savedSession.isRandomized || false);
                    setIsClozeMode(savedSession.isClozeMode || false);
                    setAppState('testing');
                    setSavedSession(null);
                    resetQuestionState();
                }
            };

            const resetQuestionState = () => {
                setUserInput(''); setFeedbackStatus('idle'); setShowHint(false); setIsFlawed(false);
            };

            const handleHardReset = () => {
                localStorage.clear();
                window.location.reload();
            };

            const handleRevealAnswer = () => {
                const vocab = vocabList[currentIndex];
                setUserInput(vocab.word); 
                setFeedbackStatus('correct'); 
                playAudio(vocab.word); 
                setIsFlawed(true);
            };

            const ProgressBar = () => (
                <div className="absolute top-6 right-6 md:top-12 md:right-12 text-xl md:text-3xl font-medium text-gray-400 tracking-widest">
                    {currentIndex + 1} / {vocabList.length}
                </div>
            );

            const ResetModal = () => (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-6">
                    <div className="bg-white p-10 rounded-[2rem] max-w-lg w-full text-center shadow-2xl animate-fade-in">
                        <h3 className="text-3xl font-bold mb-4">清空紀錄？</h3>
                        <p className="text-gray-500 text-xl mb-8">這將清除所有已儲存的單字與練習進度，且無法復原。</p>
                        <div className="flex gap-4">
                            <button onClick={handleHardReset} className="flex-1 bg-red-500 text-white py-4 rounded-2xl text-xl font-bold">確定清空</button>
                            <button onClick={() => setShowResetModal(false)} className="flex-1 bg-gray-100 text-gray-600 py-4 rounded-2xl text-xl font-bold">取消</button>
                        </div>
                    </div>
                </div>
            );

            if (appState === 'import') {
                return (
                    <div className="max-w-6xl mx-auto px-4 py-12 animate-fade-in relative min-h-screen flex flex-col items-center">
                        {showResetModal && <ResetModal />}
                        <div className="w-full flex justify-between items-center mb-12">
                            <button onClick={() => setShowResetModal(true)} className="flex items-center gap-2 text-gray-300 hover:text-red-400 transition-colors">
                                <Icon name="trash" size={20} />
                                <span className="text-sm font-bold tracking-widest">清空紀錄</span>
                            </button>
                            {savedSession && (
                                <button onClick={handleResume} className="flex items-center gap-3 bg-indigo-50 text-indigo-600 px-6 py-3 rounded-full border border-indigo-100 shadow-sm animate-bounce-subtle hover:bg-indigo-100 transition-all">
                                    <div className="relative"><Icon name="bell" size={24} /><div className="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></div></div>
                                    <span className="text-lg font-bold">繼續進度：{savedSession.vocabList[savedSession.currentIndex]?.word}</span>
                                </button>
                            )}
                        </div>
                        <h1 className="text-6xl md:text-[5rem] font-light text-center mb-12">
                            {isFirstTime ? '初次見面!!' : '歡迎回來!!'}
                        </h1>
                        <div className="flex flex-col md:flex-row gap-6 mb-12 w-full">
                            <div className="flex-1 flex items-center justify-between bg-gray-50 p-8 rounded-3xl border-2">
                                <span className="text-2xl md:text-3xl font-medium text-gray-600">隨機出題順序</span>
                                <input type="checkbox" checked={isRandomized} onChange={() => setIsRandomized(!isRandomized)} className="w-10 h-10 accent-blue-600" />
                            </div>
                            <div className="flex-1 flex items-center justify-between bg-gray-50 p-8 rounded-3xl border-2">
                                <div className="flex flex-col"><span className="text-2xl md:text-3xl font-medium text-gray-600">語境填空模式</span><span className="text-sm text-gray-400">利用翻譯與例句推敲單字</span></div>
                                <input type="checkbox" checked={isClozeMode} onChange={() => setIsClozeMode(!isClozeMode)} className="w-10 h-10 accent-indigo-500" />
                            </div>
                        </div>
                        <div className="bg-white p-8 md:p-12 rounded-[3rem] border shadow-sm w-full">
                            <div className="flex justify-between items-end mb-8">
                                <label className="text-2xl md:text-3xl text-gray-400 font-medium">雲端同步與單字清單</label>
                                <button onClick={handleManualSave} className={`flex items-center gap-3 px-6 py-3 rounded-2xl border-2 transition-all text-xl font-bold ${isSaved ? 'bg-green-50 border-green-200 text-green-600' : 'text-gray-400 border-gray-200 hover:border-black hover:text-black'}`}><Icon name={isSaved ? "check" : "save"} size={24} />{isSaved ? '已儲存' : '儲存題庫'}</button>
                            </div>

                            {/* Google 試算表同步區塊 */}
                            <div className="mb-8 p-6 bg-blue-50/50 rounded-3xl border border-blue-100 flex flex-col md:flex-row gap-4 items-center">
                                <input 
                                    type="text" 
                                    className="flex-1 w-full px-6 py-4 bg-white border-2 rounded-2xl text-xl font-mono focus:outline-none focus:border-blue-500" 
                                    value={sheetUrl} 
                                    onChange={e => setSheetUrl(e.target.value)} 
                                    placeholder="貼上 Google 試算表發布的 .csv 網址..." 
                                />
                                <button 
                                    onClick={handleFetchGoogleSheet} 
                                    className="w-full md:w-auto bg-blue-600 text-white px-8 py-4 rounded-2xl text-xl font-bold hover:bg-blue-700 transition-all active:scale-95 whitespace-nowrap"
                                >
                                    雲端同步單字
                                </button>
                            </div>

                            <textarea className="w-full h-80 p-8 bg-gray-50 border-2 rounded-3xl text-xl md:text-3xl font-mono focus:outline-none focus:ring-4 focus:ring-gray-200 resize-none leading-relaxed" value={importText} onChange={e => { setImportText(e.target.value); setIsSaved(false); }} placeholder="英文單字, 中文翻譯, 詞性, 例句, 例句中文翻譯, 提示" />
                            <button onClick={handleImport} className="w-full mt-10 bg-gray-900 text-white py-8 rounded-3xl text-3xl md:text-4xl font-bold flex items-center justify-center gap-6 active:scale-95 transition-all"><Icon name="play" size={40} />開始練習</button>
                        </div>
                    </div>
                );
            }

            if (appState === 'testing') {
            const vocab = vocabList[currentIndex];
                
                // 【優化】取單字前 4 個字母（如果單字很短就取 2 或 3 個字）作為關鍵字根來比對
                // 這樣不管是 gratify 變成 gratified，還是 study 變成 studied，都能精準捕捉！
                const keywordStub = vocab.word.length > 4 ? vocab.word.substring(0, 4) : vocab.word.substring(0, Math.max(2, vocab.word.length - 1));
                const wordRegex = new RegExp(`\\b${keywordStub}[a-zA-Z]*\\b`, 'gi');

                // 將例句中匹配到的完整變形單字全部替換為底線
                const maskedExample = vocab.example.replace(wordRegex, m => {
                    // 保留開頭第一個字母，其餘變底線，且底線長度對齊該變形單字的長度
                    if (m.length <= 2) return m[0] + '_'; 
                    return m[0] + '_'.repeat(m.length - 1);
                });

                // 直接將提示文字設定為：[詞性] 中文意思
                const hintText = `[${vocab.pos}] ${vocab.meaning}`;

                return (
                    <div className="max-w-6xl mx-auto px-4 pt-24 md:pt-40 relative animate-fade-in pb-32">
                        <div className="absolute top-6 left-6 md:top-12 md:left-12 flex gap-4">
                            <button onClick={() => { saveSessionToStorage(vocabList, mistakesList, currentIndex); setAppState('import'); }} className="text-gray-300 hover:text-gray-800 transition-colors p-2"><Icon name="home" size={32} /></button>
                            <button onClick={() => setShowResetModal(true)} className="text-gray-100 hover:text-red-400 transition-colors p-2"><Icon name="trash" size={32} /></button>
                        </div>
                        <ProgressBar />
                        <div className="text-center mb-12 md:mb-16 px-4 flex flex-col items-center">
                            {vocab.useCloze ? (
                                <div className="space-y-6 w-full">
                                    <span className="bg-indigo-100 text-indigo-600 px-6 py-2 rounded-full text-xl font-bold tracking-widest inline-block">語境推敲</span>
                                    {/* 改為直接顯示清晰的詞性與中文意思提示 */}
                                    <h2 className="text-3xl md:text-6xl font-medium text-gray-800 leading-tight tracking-wide">{hintText}</h2>
                                    <p className="text-2xl md:text-5xl font-serif text-gray-400 italic leading-relaxed">{maskedExample}</p>
                                </div>
                            ) : (
                                <h2 className="text-5xl md:text-[8rem] font-light text-gray-800 tracking-wider break-words">{vocab.meaning}</h2>
                            )}
                        </div>
                        <div className="max-w-4xl mx-auto flex flex-col gap-8">
                            <input ref={inputRef} type="text" value={userInput} onChange={e => setUserInput(e.target.value)} onKeyDown={e => { if(e.key==='Enter') feedbackStatus==='correct' ? handleNext() : handleSubmit(); }} readOnly={feedbackStatus==='correct'} className={`w-full text-center text-3xl md:text-[5rem] py-8 bg-transparent border-b-4 focus:outline-none transition-all ${feedbackStatus==='correct'?'border-green-400 text-green-600':'border-gray-300 focus:border-black'}`} placeholder="輸入單字..." autoComplete="off" spellCheck="false" />
                            
                            {feedbackStatus !== 'correct' ? (
                                <div className="flex flex-col gap-8">
                                    <div className="h-12 text-center text-xl md:text-4xl font-medium flex items-center justify-center">
                                        {feedbackStatus==='wrong' && <span className="text-red-500 animate-pulse">答錯了，再試一次</span>}
                                        {feedbackStatus==='synonym' && <span className="text-amber-500">意思接近！請輸入指定單字</span>}
                                    </div>
                                    <div className="flex flex-col gap-6">
                                        <button onClick={handleSubmit} className="bg-blue-50 text-blue-600 py-6 rounded-3xl text-3xl font-bold flex items-center justify-center gap-4 active:scale-[0.98] transition-all shadow-sm"><Icon name="enter" size={32} />送出答案 (Enter)</button>
                                        <div className="flex gap-4">
                                            {!showHint && <button onClick={() => { setShowHint(true); setIsFlawed(true); }} className="flex-1 bg-white border-2 py-5 rounded-full text-2xl text-gray-400 hover:border-gray-400 transition-all">取得提示</button>}
                                            <button onClick={handleRevealAnswer} className="flex-1 bg-white border-2 border-red-100 text-red-300 py-5 rounded-full text-2xl hover:border-red-300 transition-all">揭曉答案</button>
                                        </div>
                                        {showHint && (
                                            <div className="p-6 md:p-10 bg-gray-50 rounded-[2rem] text-center text-xl md:text-3xl text-gray-500 animate-fade-in border border-gray-200 leading-relaxed shadow-inner">
                                                <div className="mb-8 flex justify-center">
                                                    <div className="bg-white px-6 py-4 md:px-10 md:py-6 rounded-2xl border font-mono text-3xl md:text-6xl tracking-widest text-black shadow-sm flex flex-wrap justify-center gap-y-4 max-w-full">
                                                        {vocab.word.split('').map((char, i) => (
                                                            <span key={i}>{i === 0 ? char : (char === ' ' ? '\u00A0' : '_')}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                                <p className="mb-4"><span className="font-bold text-gray-700">詞性：</span>{vocab.pos}</p>
                                                <p><span className="font-bold text-gray-700">情境：</span>{vocab.context}</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div className="animate-fade-in text-center flex flex-col items-center pt-8">
                                    <div className="flex flex-col md:flex-row items-center gap-6 mb-8">
                                        <h3 className="text-5xl md:text-[7rem] font-bold tracking-tight text-gray-900">{vocab.word}</h3>
                                        <button onClick={() => playAudio(vocab.word)} className="p-6 bg-gray-100 rounded-full hover:bg-gray-200 transition-all"><Icon name="volume" size={48} /></button>
                                    </div>
                                    <div className="flex gap-4 bg-gray-50 px-10 py-4 rounded-full text-xl md:text-4xl mb-12 font-bold shadow-sm">
                                        <span className="text-blue-500">[{vocab.pos}]</span><span className="text-gray-700">{vocab.meaning}</span>
                                    </div>
                                    
                                    <div className="w-full bg-gray-50 p-10 md:p-12 rounded-[3rem] border border-gray-100 text-center mb-12 shadow-inner">
                                        <p className="text-2xl md:text-5xl italic font-serif text-gray-600 mb-6 leading-relaxed break-words">"{vocab.example}"</p>
                                        <p className="text-xl md:text-3xl text-gray-400 font-medium leading-relaxed break-words">{vocab.exampleTranslation}</p>
                                    </div>
                                    
                                    <button onClick={handleNext} className="w-full md:w-auto bg-gray-900 text-white px-24 py-10 rounded-full text-3xl md:text-4xl font-bold flex items-center justify-center gap-6 shadow-2xl active:scale-95 transition-all">繼續下題 <Icon name="arrowRight" size={48} /></button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            if (appState === 'results') {
                return (
                    <div className="max-w-6xl mx-auto px-4 flex flex-col items-center justify-center min-h-screen text-center animate-fade-in py-20">
                        <h2 className="text-6xl md:text-[8rem] font-light mb-8">練習完成</h2>
                        <p className="text-2xl md:text-5xl text-gray-400 mb-16 font-light leading-relaxed">共練習了 {vocabList.length} 個單字，{mistakesList.length === 0 ? '完美表現！' : `有 ${mistakesList.length} 個需要加強。`}</p>
                        {mistakesList.length > 0 && (
                            <div className="w-full bg-white rounded-[3rem] border-2 border-red-50 overflow-hidden mb-12 shadow-sm">
                                <div className="bg-red-50/50 py-8 border-b-2 text-2xl md:text-3xl font-bold text-red-800">不熟練清單</div>
                                <div className="max-h-[35rem] overflow-y-auto no-scrollbar">
                                    {mistakesList.map((item, idx) => (
                                        <div key={idx} className="flex justify-between items-center p-8 border-b last:border-0 hover:bg-gray-50 transition-colors">
                                            <div className="text-left"><p className="text-3xl md:text-5xl font-bold mb-2 text-gray-800">{item.word}</p><p className="text-xl md:text-3xl text-gray-400 font-medium">[{item.pos}] {item.meaning}</p></div>
                                            <button onClick={() => playAudio(item.word)} className="p-6 bg-gray-100 rounded-full text-gray-400 hover:text-black hover:bg-gray-100 transition-all"><Icon name="volume" size={32} /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        <div className="flex flex-col md:flex-row gap-6 w-full max-w-5xl">
                            {mistakesList.length > 0 && <button onClick={() => { let list = mistakesList.map(i => ({...i, useCloze: isClozeMode ? Math.random() > 0.5 : false})); setVocabList(list); setMistakesList([]); setCurrentIndex(0); resetQuestionState(); setAppState('testing'); saveSessionToStorage(list, [], 0); }} className="flex-1 bg-gray-900 text-white py-10 rounded-3xl text-2xl md:text-3xl font-bold flex items-center justify-center gap-4 active:scale-95 transition-all shadow-xl"><Icon name="rotate" size={32} />重測不熟單字</button>}
                            <button onClick={() => { localStorage.removeItem('vocab_app_session'); setAppState('import'); setSavedSession(null); }} className={`flex-1 py-10 rounded-3xl text-2xl md:text-3xl font-bold shadow-lg active:scale-95 transition-all ${mistakesList.length > 0 ? 'bg-white border-2 text-gray-500' : 'bg-gray-900 text-white'}`}>返回首頁</button>
                        </div>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
