<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>極簡單字挑戰 PRO</title>
    
    <!-- PWA 與 行動裝置優化 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- 外部資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes neon-glow {
            0%, 100% { box-shadow: 0 0 5px rgba(99, 102, 241, 0.2), 0 0 10px rgba(99, 102, 241, 0.2); }
            50% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.6), 0 0 25px rgba(99, 102, 241, 0.4); }
        }
        .neon-border { border: 1px solid rgba(99, 102, 241, 0.5); animation: neon-glow 3s infinite; }
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input::placeholder { color: #475569; }
    </style>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed'));
            });
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- 組件：圖標 ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                play: <path d="m6 3 14 9-14 9V3z" />,
                save: <React.Fragment><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></React.Fragment>,
                trash: <React.Fragment><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></React.Fragment>,
                volume: <React.Fragment><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /></React.Fragment>,
                home: <React.Fragment><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22" /></React.Fragment>,
                rotate: <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8M21 3v5h-5" />,
                arrowRight: <path d="M5 12h14M12 5l7 7-7 7" />
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            // 預設內容
            const defaultText = `apple, 蘋果, fruit, 名詞, 水果店購物, An apple a day keeps the doctor away., 一天一蘋果，醫生遠離我。\nbrave, 勇敢的, fearless/courageous, 形容詞, 描述人物性格, He is a brave firefighter., 他是一位勇敢的消防員。`;

            // 狀態管理
            const [appState, setAppState] = useState('import');
            const [vocabList, setVocabList] = useState([]);
            const [mistakesList, setMistakesList] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [userInput, setUserInput] = useState('');
            const [feedbackStatus, setFeedbackStatus] = useState('idle');
            const [isRandomized, setIsRandomized] = useState(false);
            const [isClozeMode, setIsClozeMode] = useState(false);
            const [quizDirection, setQuizDirection] = useState('ch-to-en'); // ch-to-en, en-to-ch
            
            const [importText, setImportText] = useState(() => localStorage.getItem('vocab_app_raw_text') || defaultText);
            const [isSaved, setIsSaved] = useState(false);
            const inputRef = useRef(null);

            // 自動對焦
            useEffect(() => {
                if (appState === 'testing' && inputRef.current) inputRef.current.focus();
            }, [appState, currentIndex, feedbackStatus]);

            // 音訊
            const playAudio = (word) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(word);
                    u.lang = 'en-US';
                    window.speechSynthesis.speak(u);
                }
            };

            const handleImport = () => {
                let list = importText.split('\n').filter(l => l.trim()).map(line => {
                    const p = line.split(',').map(s => s.trim());
                    const word = p[0] || '';
                    return {
                        word, meaning: p[1] || '',
                        synonyms: p[2] ? p[2].split('/').map(s => s.trim().toLowerCase()) : [],
                        pos: p[3] || 'n/a', context: p[4] || 'n/a',
                        example: p[5] || '', exampleTranslation: p[6] || ''
                    };
                }).filter(i => i.word && i.meaning);

                if (list.length > 0) {
                    const final = isRandomized ? [...list].sort(() => Math.random() - 0.5) : list;
                    setVocabList(final); setMistakesList([]); setCurrentIndex(0);
                    setUserInput(''); setFeedbackStatus('idle'); setAppState('testing');
                }
            };

            const handleSubmit = () => {
                const target = vocabList[currentIndex];
                const input = userInput.trim().toLowerCase();
                const correctAns = quizDirection === 'ch-to-en' ? target.word.toLowerCase() : target.meaning;
                
                if (input === correctAns.toLowerCase()) {
                    setFeedbackStatus('correct');
                    if (quizDirection === 'ch-to-en') playAudio(target.word);
                } else {
                    setFeedbackStatus('wrong');
                }
            };

            const handleNext = () => {
                if (currentIndex + 1 < vocabList.length) {
                    setCurrentIndex(currentIndex + 1); setUserInput(''); setFeedbackStatus('idle');
                } else {
                    setAppState('results');
                }
            };

            // --- 畫面渲染：匯入 ---
            if (appState === 'import') {
                return (
                    <div className="max-w-4xl mx-auto px-6 py-12 animate-fade-in flex flex-col items-center">
                        <h1 className="text-5xl font-bold mb-10 bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">單字挑戰 Pro</h1>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 w-full">
                            <button onClick={() => setQuizDirection(quizDirection === 'ch-to-en' ? 'en-to-ch' : 'ch-to-en')} className="glass p-4 rounded-2xl flex flex-col items-center neon-border">
                                <span className="text-xs text-indigo-400 mb-1">練習方向</span>
                                <span className="font-bold">{quizDirection === 'ch-to-en' ? '中 → 英' : '英 → 中'}</span>
                            </button>
                            <label className="glass p-4 rounded-2xl flex flex-col items-center cursor-pointer">
                                <span className="text-xs text-indigo-400 mb-1">隨機順序</span>
                                <input type="checkbox" checked={isRandomized} onChange={e => setIsRandomized(e.target.checked)} className="mt-1 w-5 h-5 accent-indigo-500" />
                            </label>
                            <label className="glass p-4 rounded-2xl flex flex-col items-center cursor-pointer">
                                <span className="text-xs text-indigo-400 mb-1">語境模式</span>
                                <input type="checkbox" checked={isClozeMode} onChange={e => setIsClozeMode(e.target.checked)} className="mt-1 w-5 h-5 accent-indigo-500" />
                            </label>
                        </div>

                        <div className="w-full glass p-8 rounded-[2rem] shadow-2xl relative overflow-hidden">
                            <textarea className="w-full h-64 bg-slate-900/50 border border-slate-700 rounded-2xl p-6 text-indigo-100 font-mono text-sm no-scrollbar focus:outline-none focus:ring-2 focus:ring-indigo-500/50" 
                                value={importText} onChange={e => setImportText(e.target.value)} placeholder="word, meaning, synonyms, pos, context, example, translation" />
                            <button onClick={handleImport} className="w-full mt-6 bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl text-xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95 shadow-lg shadow-indigo-500/20">
                                <Icon name="play" /> 開始挑戰
                            </button>
                        </div>
                    </div>
                );
            }

            // --- 畫面渲染：練習 ---
            if (appState === 'testing') {
                const vocab = vocabList[currentIndex];
                const displayQuest = quizDirection === 'ch-to-en' ? vocab.meaning : vocab.word;
                const maskedExample = vocab.example.replace(new RegExp(vocab.word, 'gi'), "____");

                return (
                    <div className="max-w-4xl mx-auto px-6 py-20 text-center animate-fade-in relative min-h-screen flex flex-col justify-center">
                        <button onClick={() => setAppState('import')} className="absolute top-10 left-6 text-slate-500 hover:text-white"><Icon name="home" size={28}/></button>
                        <div className="absolute top-12 right-6 text-indigo-400 font-mono text-xl">{currentIndex + 1} / {vocabList.length}</div>

                        <div className="mb-16">
                            {isClozeMode && vocab.example ? (
                                <div className="space-y-6">
                                    <h2 className="text-4xl font-bold text-white leading-tight">{vocab.exampleTranslation}</h2>
                                    <p className="text-2xl text-slate-400 italic font-serif">"{maskedExample}"</p>
                                </div>
                            ) : (
                                <h2 className="text-7xl md:text-9xl font-bold tracking-tight text-white">{displayQuest}</h2>
                            )}
                        </div>

                        <div className="max-w-2xl mx-auto w-full">
                            <input ref={inputRef} type="text" value={userInput} onChange={e => setUserInput(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && (feedbackStatus === 'correct' ? handleNext() : handleSubmit())}
                                readOnly={feedbackStatus === 'correct'}
                                className={`w-full text-center text-4xl md:text-6xl py-6 bg-transparent border-b-4 transition-all duration-300 focus:outline-none ${feedbackStatus === 'correct' ? 'border-emerald-400 text-emerald-400' : (feedbackStatus === 'wrong' ? 'border-rose-500 animate-shake' : 'border-slate-700 focus:border-indigo-500')}`}
                                placeholder="TYPE HERE..." autoComplete="off" />
                            
                            {feedbackStatus === 'correct' ? (
                                <div className="mt-12 animate-fade-in">
                                    <div className="flex justify-center items-center gap-6 mb-8">
                                        <div className="text-5xl font-black text-white">{vocab.word}</div>
                                        <button onClick={() => playAudio(vocab.word)} className="p-4 glass rounded-full hover:bg-slate-700"><Icon name="volume" size={32}/></button>
                                    </div>
                                    <button onClick={handleNext} className="bg-emerald-500 hover:bg-emerald-400 text-white px-16 py-5 rounded-full text-2xl font-bold inline-flex items-center gap-3 shadow-xl shadow-emerald-500/20 active:scale-95">
                                        NEXT <Icon name="arrowRight" />
                                    </button>
                                </div>
                            ) : (
                                <button onClick={handleSubmit} className="mt-12 text-indigo-400 font-bold tracking-widest hover:text-white transition-colors">按下 ENTER 送出</button>
                            )}
                        </div>
                    </div>
                );
            }

            if (appState === 'results') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen animate-fade-in">
                        <h2 className="text-6xl font-black mb-4">FINISH!</h2>
                        <p className="text-slate-400 text-xl mb-12">完成練習了，繼續保持！</p>
                        <button onClick={() => setAppState('import')} className="glass px-12 py-5 rounded-2xl text-xl font-bold hover:bg-indigo-600 transition-all active:scale-95">
                            返回首頁
                        </button>
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
